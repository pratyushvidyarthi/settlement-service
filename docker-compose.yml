services:
  mock-gateway:
    build:
      context: ./mock-gateway
    ports:
      - "4000:4000"
    environment:
      GATEWAY_PORT: "4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 5

  settlement-service:
    build:
      context: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      # Resolved via Docker Compose's internal DNS — service name maps to container.
      GATEWAY_URL: http://mock-gateway:4000
      DATABASE_URL: /data/settlement.db
    volumes:
      - settlement-data:/data
    depends_on:
      mock-gateway:
        condition: service_healthy

volumes:
  settlement-data:
